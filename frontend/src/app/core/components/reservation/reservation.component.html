<div class="reservation-page">
  <h2>Create Reservation</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" style="width:100%">
      <mat-label>Room</mat-label>
      <mat-select formControlName="roomId">
        <mat-option *ngFor="let r of rooms" [value]="r.id">{{ r.roomName }} ({{ r.roomLocation }})</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:100%">
      <mat-label>Date</mat-label>
      <input matInput type="date" formControlName="date" />
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:48%; margin-right:4%">
      <mat-label>Start time</mat-label>
      <input matInput type="time" formControlName="startTime" />
    </mat-form-field>

    <mat-form-field appearance="outline" style="width:48%">
      <mat-label>End time</mat-label>
      <input matInput type="time" formControlName="endTime" />
    </mat-form-field>

    <div *ngIf="error" class="error">{{ error }}</div>

    <button mat-raised-button color="primary" type="submit" [disabled]="loading">
      {{ loading ? 'Submitting...' : 'Reserve' }}
    </button>
  </form>
</div>
